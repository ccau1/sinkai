name: Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'messages/**'
      - 'Dockerfile'
      - 'deploy/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}:latest
            ${{ env.IMAGE_BASE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write production .env
        run: |
          mkdir -p deploy
          echo "${{ secrets.ENV_FILE }}" > deploy/.env

      - name: Copy compose & nginx to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          source: "deploy/docker-compose.prod.yml,deploy/.env,deploy/nginx.ssl.conf"
          target: "/opt/sinkai"
          strip_components: 1

      - name: Deploy on Hetzner
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -e
            cd /opt/sinkai

            # Authenticate to GHCR so the server can pull private images
            echo "${{ secrets.GH_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Set image reference and pull latest
            export APP_IMAGE="${{ env.IMAGE_BASE }}:latest"
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d

            # Prune old dangling images to save disk
            docker image prune -af
            docker system prune -f

      - name: Health check
        run: |
          HEALTH_URL="https://sinkai.tribalorigin.com"
          echo "Testing site: $HEALTH_URL"
          echo "Waiting for containers to start..."
          for i in {1..12}; do
            sleep 5
            echo "Attempt $i/12: curl -sf $HEALTH_URL"
            if curl -sf "$HEALTH_URL"; then
              echo "Health check passed: $HEALTH_URL"
              exit 0
            fi
            echo "Attempt $i/12 failed, retrying..."
          done
          echo "Health check failed after 60 seconds: $HEALTH_URL"
          exit 1
